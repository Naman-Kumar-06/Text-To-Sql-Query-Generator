kind = "web"
previewPath = "/"
title = "AI SQL Generator"
version = "1.0.0"
id = "artifacts/ai-sql-generator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25287

[services.development]
run = "pnpm --filter @workspace/ai-sql-generator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-sql-generator", "run", "build" ]
publicDir = "artifacts/ai-sql-generator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25287"
BASE_PATH = "/"
